<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Tổng Hợp Kết Quả</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .stat-card { border: none; border-radius: 10px; color: white; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .bg-total { background: linear-gradient(45deg, #34495e, #2c3e50); }
        .bg-valid { background: linear-gradient(45deg, #27ae60, #2ecc71); }
        .bg-invalid { background: linear-gradient(45deg, #e74c3c, #c0392b); }
        .chart-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">HỆ THỐNG GIÁM SÁT TỔNG HỢP</h2>
        <div>
            <button class="btn btn-primary fw-bold me-2" onclick="generateDoc('Mau_23.docx')">XUẤT MẪU 23</button>
            <button class="btn btn-success fw-bold me-2" onclick="generateDoc('Mau_24.docx')">XUẤT MẪU 24</button>
            <button class="btn btn-outline-danger" onclick="resetSystem()">LÀM MỚI HỆ THỐNG</button>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card stat-card bg-total p-3">
                <small>TỔNG PHIẾU THU VÀO</small>
                <h2 id="txt-total">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card bg-valid p-3">
                <small>PHIẾU HỢP LỆ</small>
                <h2 id="txt-valid">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card bg-invalid p-3">
                <small>PHIẾU KHÔNG HỢP LỆ</small>
                <h2 id="txt-invalid">0</h2>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="chart-container">
                <h5 class="mb-4">Tỷ lệ phiếu bầu các ứng cử viên</h5>
                <canvas id="votesChart" height="150"></canvas>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="chart-container" style="max-height: 450px; overflow-y: auto;">
                <h5 class="mb-3">Tiến độ 20 tổ kiểm phiếu</h5>
                <div id="group-progress">
                    </div>
            </div>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let currentData = null;
    let chart = null;
    const CANDIDATES = ["Trung Hải", "Tâm Hiền", "Văn Hùng", "Hồng Linh", "Đức Tuấn", "Thế Uyên"];

    // 1. Khởi tạo biểu đồ
    function initChart() {
        const ctx = document.getElementById('votesChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: CANDIDATES,
                datasets: [{
                    label: 'Số phiếu bầu',
                    data: [0,0,0,0,0,0],
                    backgroundColor: '#3498db',
                    borderRadius: 5
                }]
            },
            options: { indexAxis: 'y', plugins: { legend: { display: false } } }
        });
    }

    // 2. Lắng nghe cập nhật từ Server
    socket.on('update_dashboard', (data) => {
        currentData = data;
        
        // Cập nhật số liệu chữ
        document.getElementById('txt-total').innerText = data.totalBallots.toLocaleString();
        document.getElementById('txt-valid').innerText = data.validBallots.toLocaleString();
        document.getElementById('txt-invalid').innerText = data.invalidBallots.toLocaleString();

        // Cập nhật biểu đồ
        chart.data.datasets[0].data = data.votes;
        chart.update();

        // Cập nhật tiến độ các tổ
        updateGroupProgress(data.groups);
    });

    function updateGroupProgress(groups) {
        let html = "";
        for(let i=1; i<=20; i++) {
            let count = groups[i] || 0;
            let percent = Math.min((count / 3750) * 100, 100); // Giả định mỗi tổ ~3750 phiếu
            html += `
                <div class="mb-2">
                    <div class="d-flex justify-content-between small"><span>Tổ ${i}</span><span>${count} phiếu</span></div>
                    <div class="progress" style="height: 8px;"><div class="progress-bar bg-info" style="width: ${percent}%"></div></div>
                </div>`;
        }
        document.getElementById('group-progress').innerHTML = html;
    }

    // 3. Hàm xuất file Word (Tránh lỗi Render)
    async function generateDoc(templateName) {
        if(!currentData || currentData.totalBallots === 0) return alert("Chưa có dữ liệu!");

        try {
            // Tải file mẫu từ server
            const response = await fetch(`/${templateName}`);
            const content = await response.arrayBuffer();
            const zip = new PizZip(content);
            const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

            // Chuẩn bị dữ liệu đổ vào Tag [cite: 26, 30, 31, 32, 34-39, 72-76]
            const renderData = {
                tong_phieu_thu: currentData.totalBallots,
                phiieu_hop_le: currentData.validBallots,
                phiieu_khong_hop_le: currentData.invalidBallots
            };

            // Đổ tên và số phiếu từng người
            CANDIDATES.forEach((name, i) => {
                renderData[`ten_${i+1}`] = name;
                renderData[`v_${i+1}`] = currentData.votes[i];
                renderData[`p_${i+1}`] = currentData.validBallots > 0 
                    ? ((currentData.votes[i] / currentData.validBallots) * 100).toFixed(2) : "0.00";
            });

            // Tính danh sách trúng cử (Top 5)
            const winners = CANDIDATES.map((name, i) => ({
                name, v: currentData.votes[i], p: currentData.validBallots > 0 ? (currentData.votes[i]/currentData.validBallots*100).toFixed(2) : 0
            })).sort((a,b) => b.v - a.v).slice(0, 5);

            winners.forEach((w, i) => {
                renderData[`trung_ten_${i+1}`] = w.name;
                renderData[`trung_v_${i+1}`] = w.v;
                renderData[`trung_p_${i+1}`] = w.p;
            });

            // Thực hiện render
            doc.render(renderData);
            const out = doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
            saveAs(out, `Ket_Qua_${templateName}`);

        } catch (error) {
            console.error(error);
            alert("Lỗi khi tạo file. Hãy kiểm tra các tag {{ }} trong file mẫu.");
        }
    }

    function resetSystem() {
        if(confirm("CẢNH BÁO: Xóa toàn bộ dữ liệu 75.000 phiếu?")) socket.emit('reset_all_data');
    }

    initChart();
</script>
</body>
</html>
