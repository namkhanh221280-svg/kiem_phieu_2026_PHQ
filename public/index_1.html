<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổ Kiểm Phiếu - Hệ Thống Bầu Cử</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .station-container { max-width: 600px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; shadow: 0 4px 12px rgba(0,0,0,0.1); }
        .candidate-item { font-size: 1.3rem; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .candidate-item:hover { background-color: #fdf2f2; }
        .form-check-input { width: 1.6em; height: 1.6em; border-color: #dc3545; }
        .status-bar { font-weight: bold; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; }
        .online { background-color: #d4edda; color: #155724; }
        .offline { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <div class="station-container">
        <div id="connectionStatus" class="status-bar offline">ĐANG KẾT NỐI SERVER...</div>
        
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="text-primary mb-0">TỔ KIỂM PHIẾU SỐ: <span id="groupNumberDisplay">--</span></h4>
            <div class="badge bg-secondary">Đã nhập: <span id="localCount">0</span></div>
        </div>

        <div class="card border-danger mb-4">
            <div class="card-header bg-danger text-white fw-bold">TÍCH CHỌN NGƯỜI BỊ GẠCH</div>
            <div class="card-body p-0">
                <div id="candidateList"></div>
            </div>
        </div>

        <button id="btnConfirm" class="btn btn-danger w-100 py-3 fw-bold shadow" style="font-size: 1.4rem;">
            XÁC NHẬN (ENTER)
        </button>
        
        <p class="text-muted small mt-3 text-center italic">* Phiếu hợp lệ: Còn lại từ 1 đến 5 người (không gạch hết hoặc gạch quá 5).*</p>
    </div>
</div>

<script>
    // 1. Cấu hình ban đầu
    const socket = io(); // Tự động kết nối tới server cùng host
    const CONFIG = { 
        candidates: ["Trung Hải", "Tâm Hiền", "Văn Hùng", "Hồng Linh", "Đức Tuấn", "Thế Uyên"], 
        maxToElect: 5 
    };
    let localCounter = 0;
    let groupId = localStorage.getItem('groupId') || prompt("Nhập số thứ tự Tổ (1-20):");
    
    if(!groupId) groupId = "1";
    localStorage.setItem('groupId', groupId);
    document.getElementById('groupNumberDisplay').innerText = groupId;

    // 2. Xử lý kết nối
    socket.on('connect', () => {
        const status = document.getElementById('connectionStatus');
        status.innerText = "ĐÃ KẾT NỐI SERVER - SẴN SÀNG";
        status.className = "status-bar online";
        // Thông báo cho server biết đây là tổ nào
        socket.emit('register_group', groupId);
    });

    socket.on('disconnect', () => {
        const status = document.getElementById('connectionStatus');
        status.innerText = "MẤT KẾT NỐI SERVER!";
        status.className = "status-bar offline";
    });

    // 3. Hiển thị danh sách ứng cử viên
    function render() {
        document.getElementById('candidateList').innerHTML = CONFIG.candidates.map((name, i) => `
            <div class="form-check candidate-item d-flex align-items-center">
                <input class="form-check-input me-3" type="checkbox" id="chk_${i}">
                <label class="form-check-label w-100" for="chk_${i}">${i + 1}. ${name}</label>
            </div>
        `).join('');
    }

    // 4. Xử lý gửi phiếu
    function sendVote() {
        const checks = document.querySelectorAll('.form-check-input');
        let gachIndexes = []; // Danh sách người bị gạch
        let selectedIndexes = []; // Danh sách người được chọn (không gạch)

        checks.forEach((c, i) => {
            if (c.checked) gachIndexes.push(i);
            else selectedIndexes.push(i);
        });

        const conLai = selectedIndexes.length;
        const isValid = (conLai > 0 && conLai <= CONFIG.maxToElect);

        // Gói dữ liệu gửi đi
        const payload = {
            groupId: groupId,
            isValid: isValid,
            selectedIndexes: selectedIndexes, // Gửi danh sách ID người được bầu
            timestamp: new Date().getTime()
        };

        // Gửi qua Socket.io
        socket.emit('submit_ballot', payload);

        // Cập nhật giao diện local
        localCounter++;
        document.getElementById('localCount').innerText = localCounter;
        
        // Reset form
        checks.forEach(c => c.checked = false);
        window.scrollTo(0, 0);
    }

    // Sự kiện nút bấm và phím Enter
    document.getElementById('btnConfirm').addEventListener('click', sendVote);
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendVote();
    });

    render();
</script>
</body>
</html>
